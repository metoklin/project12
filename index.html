<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的代辦事項速記</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="all.css">
</head>

<body>
    <header class="header">
        <h1>我的代辦事項速記</h1>
        <p style="color: #64748b; font-weight: 500;">專注目標，有序執行</p>
    </header>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="在此輸入新任務..." autocomplete="off">
        <button id="addTaskBtn">新增任務</button>
    </div>

    <main class="board">
        <!-- 未執行 -->
        <section class="column">
            <div class="column-header">
                <div class="column-title">
                    <span class="dot dot-todo"></span>
                    未執行
                </div>
            </div>
            <div id="todo-list" class="task-list"></div>
        </section>

        <!-- 執行中 -->
        <section class="column">
            <div class="column-header">
                <div class="column-title">
                    <span class="dot dot-doing"></span>
                    執行中
                </div>
            </div>
            <div id="doing-list" class="task-list"></div>
        </section>

        <!-- 已執行 -->
        <section class="column">
            <div class="column-header">
                <div class="column-title">
                    <span class="dot dot-done"></span>
                    已執行
                </div>
            </div>
            <div id="done-list" class="task-list"></div>
        </section>
    </main>

    <script src="all.js"></script>
</body>

</html>
