<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的代辦事項速記</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="all.css">
</head>

<body>
    <header class="header">
        <h1>我的代辦事項速記</h1>
        <p style="color: #64748b; font-weight: 500;">專注目標，有序執行</p>
    </header>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="在此輸入新任務..." autocomplete="off">
        <button id="addTaskBtn">新增任務</button>
    </div>

    <main class="board single-board">
        <section class="column single-column">
            <div id="all-tasks-list" class="task-list"></div>
        </section>
    </main>

    <script src="all.js"></script>
</body>

</html>
